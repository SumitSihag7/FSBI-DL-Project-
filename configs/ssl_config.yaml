# ssl_config.yaml
# ─────────────────
# Phase 1: SSL Pretraining Configuration

# ── Data ──────────────────────────────────────
data:
  data_dir: "/path/to/unlabeled_images"
  image_size: 224
  n_local_crops: 6
  num_workers: 4

# ── Model ─────────────────────────────────────
model:
  vit_model: "vit_base_patch16_224"
  pretrained: true
  dino_out_dim: 65536
  proj_dim: 256
  pacl_dim: 128

# ── DINO ──────────────────────────────────────
dino:
  warmup_teacher_temp: 0.04
  teacher_temp: 0.04
  warmup_teacher_temp_epochs: 30
  student_temp: 0.1
  center_momentum: 0.9

# ── EMA ───────────────────────────────────────
ema:
  base_momentum: 0.996   # cosine schedule → 1.0

# ── Losses ────────────────────────────────────
losses:
  dino_weight: 1.0
  nce_weight: 0.5
  pacl_weight: 0.5
  nce_temperature: 0.07
  pacl_temperature: 0.1
  pacl_consistency_margin: 0.2
  pacl_subsample: 16

# ── Training ──────────────────────────────────
training:
  epochs: 100
  batch_size: 64
  lr: 1.0e-4
  weight_decay: 0.04
  lr_min: 1.0e-6
  amp: true
  log_interval: 50
  save_interval: 10
  output_dir: "./checkpoints/ssl"
